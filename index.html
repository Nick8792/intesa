<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0E1726" />
  <meta name="description" content="Intesa — il piano di pagamento ottimale, in tempo reale." />
  <title>Intesa</title>
  <link rel="icon" href="./icons/favicon-64.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- ===================== TOP BAR ===================== -->
  <header class="topbar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 100 100" aria-hidden="true">
        <rect x="22" y="30" width="13" height="44" rx="6.5" fill="var(--emerald)"/>
        <rect x="65" y="26" width="13" height="44" rx="6.5" fill="#fff" opacity="0.92"/>
        <circle cx="50" cy="42" r="10.5" fill="var(--emerald)"/>
        <rect x="32" y="66" width="36" height="9" rx="4.5" fill="#fff" opacity="0.92"/>
      </svg>
      <div class="brand-text">
        <span class="brand-name">Intesa</span>
        <span class="brand-tag">Il piano ottimale, in tempo reale</span>
      </div>
    </div>
    <div class="topbar-actions">
      <button id="btnManual" class="icon-btn" type="button" aria-pressed="false" title="Modalità Manuale Assistita">
        <span class="icon-btn-label">Manuale</span>
      </button>
      <button id="btnAdmin" class="icon-btn icon-btn--gear" type="button" title="Pannello Amministratore" aria-label="Pannello Amministratore">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8m0 2a2 2 0 1 1 0 4 2 2 0 0 1 0-4m-1.4-7h2.8l.4 2.2c.6.2 1.2.5 1.7.9l2.1-.8 1.4 2.4-1.7 1.4c.1.6.1 1.2 0 1.8l1.7 1.4-1.4 2.4-2.1-.8c-.5.4-1.1.7-1.7.9L13.4 21h-2.8l-.4-2.2c-.6-.2-1.2-.5-1.7-.9l-2.1.8-1.4-2.4 1.7-1.4a6.8 6.8 0 0 1 0-1.8L3.3 9.5l1.4-2.4 2.1.8c.5-.4 1.1-.7 1.7-.9z"/></svg>
      </button>
    </div>
  </header>

  <main class="wrap">
    <!-- ===================== INPUT ===================== -->
    <section class="card inputs" aria-label="Dati della trattativa">
      <div class="field">
        <label for="prezzo">Prezzo del pacchetto</label>
        <div class="money-input">
          <span class="euro">€</span>
          <input id="prezzo" inputmode="numeric" autocomplete="off" />
        </div>
        <div class="chips" id="chipsPrezzo"></div>
      </div>

      <div class="field">
        <label>Rate desiderate dal cliente</label>
        <div class="chips chips--rate" id="chipsRate"></div>
      </div>

      <div class="grid-2">
        <div class="field">
          <label for="dispOggi">Disponibilità oggi <span class="opt">(facolt.)</span></label>
          <div class="money-input">
            <span class="euro">€</span>
            <input id="dispOggi" inputmode="numeric" autocomplete="off" placeholder="nessun limite" />
          </div>
        </div>
        <div class="field">
          <label for="maxMensile">Max rata mensile <span class="opt">(facolt.)</span></label>
          <div class="money-input">
            <span class="euro">€</span>
            <input id="maxMensile" inputmode="numeric" autocomplete="off" placeholder="nessun limite" />
          </div>
        </div>
      </div>

      <div class="field">
        <label>Priorità</label>
        <div class="pills" id="pillsPriorita"></div>
      </div>
    </section>

    <!-- ===================== RISULTATO ===================== -->
    <section id="result" class="result" aria-live="polite"></section>

    <!-- ===================== AZIONI ===================== -->
    <div class="actions" id="actions" hidden>
      <button id="btnCopia" class="btn btn--primary" type="button">Copia proposta</button>
      <button id="btnNuova" class="btn btn--ghost" type="button">Nuova trattativa</button>
    </div>
  </main>

  <!-- ===================== DRAWER ADMIN ===================== -->
  <div id="overlay" class="overlay" hidden></div>
  <aside id="admin" class="drawer" aria-hidden="true" aria-label="Pannello Amministratore">
    <div class="drawer-head">
      <h2>Pannello Amministratore</h2>
      <button id="btnAdminClose" class="icon-btn" type="button" aria-label="Chiudi">✕</button>
    </div>
    <div class="drawer-body" id="adminBody"><!-- generato da JS --></div>
    <div class="drawer-foot">
      <button id="btnAdminExport" class="btn btn--ghost btn--sm" type="button">Esporta config</button>
      <button id="btnAdminImport" class="btn btn--ghost btn--sm" type="button">Importa config</button>
      <button id="btnAdminReset" class="btn btn--ghost btn--sm" type="button">Ripristina default</button>
      <input id="importFile" type="file" accept="application/json" hidden />
    </div>
  </aside>

  <div id="toast" class="toast" hidden></div>

  <script src="./app.js"></script>
</body>
</html>
